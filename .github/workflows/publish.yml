name: Publish to PyPI

on:
  push:
    tags:
      - "v[0-9]*"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v8

      - name: Build
        run: uv build

      - name: Publish to PyPI
        run: uv publish
